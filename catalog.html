<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Каталог — Bellico</title>
  <meta name="description" content="Каталог премиальной мебели Bellico: диваны, кресла, столы, стулья, кровати, системы хранения, освещение и декор. Фильтры, сортировка и поиск.">
  <meta name="theme-color" content="#FAF8F4">
  <meta property="og:title" content="Каталог — Bellico">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="catalog">
  <header id="site-header"></header>

  <main id="main">
    <div class="container">
      <div class="page-head">
        <nav class="breadcrumbs" aria-label="Хлебные крошки"><a href="index.html">Главная</a> / Каталог</nav>
        <h1 class="page-head__title">Каталог</h1>
      </div>

      <div class="toolbar">
        <div class="toolbar__search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <input type="search" id="cat-search" placeholder="Поиск по каталогу…" aria-label="Поиск по каталогу" autocomplete="off">
        </div>
        <div class="filters" id="cat-filters" role="group" aria-label="Фильтр по категориям"></div>
        <div class="toolbar__sort">
          <label for="cat-sort">Сортировка</label>
          <select class="select" id="cat-sort" aria-label="Сортировка товаров">
            <option value="popular">По популярности</option>
            <option value="price-asc">Сначала дешевле</option>
            <option value="price-desc">Сначала дороже</option>
            <option value="name">По названию</option>
          </select>
        </div>
      </div>

      <p class="result-count" id="result-count"></p>
      <div class="product-grid" id="catalog-grid"></div>
      <div class="load-more-wrap" id="catalog-more"></div>
    </div>
  </main>

  <footer id="site-footer"></footer>

  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/state.js"></script>
  <script src="js/components.js"></script>
  <script src="js/shop.js"></script>
  <script src="js/account.js"></script>
  <script src="js/checkout.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
